<style>
:root{--teal:#076261;--gold:#b08d3e;--ink:#1c2226;--muted:#6b7780;--line:#e6e9eb}

.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}

input{width:100%;box-sizing:border-box;padding:13px 14px;font-size:15px;border:1px solid var(--line);border-radius:8px;outline:none;font-family:inherit;text-align:center;letter-spacing:.06em}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(7,98,97,.12)}
button{width:100%;margin-top:12px;padding:13px;font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:var(--teal);color:#fff;border:0;border-radius:8px;cursor:pointer}
button:hover{background:#0b7d7c}
.err{color:#b03a2e;font-size:12.5px;margin-top:12px;min-height:16px}
.foot{margin-top:26px;font-size:10.5px;color:#9aa6ae;letter-spacing:.08em}
</style>

document.getElementById('f').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('err'); err.textContent = '';
  try {
    const pw = document.getElementById('pw').value;
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b(ENC.salt), iterations:ENC.iter, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(ENC.nonce)}, key, b(ENC.ct));
    document.open(); document.write(new TextDecoder().decode(pt)); document.close();
  } catch (ex) { err.textContent = 'Incorrect password.'; }
});
