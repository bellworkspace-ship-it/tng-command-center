<title>TNG Leadership Command Center</title>

<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #0a1628; color: #e8f0fa; font-family: 'Open Sans', system-ui, sans-serif; }
  .lock-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
  .lock-card { width: 100%; max-width: 420px; background: linear-gradient(145deg, #0f1f36 0%, #132946 100%); border: 1px solid #1d3a5f; border-radius: 14px; padding: 36px 32px 30px; box-shadow: 0 18px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(26,181,181,0.06); text-align: center; }
  .lock-logo { max-width: 160px; margin: 0 auto 22px; display: block; opacity: 0.95; }
  .lock-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 20px; color: #1ab5b5; margin: 0 0 6px; letter-spacing: 0.3px; }
  .lock-sub { color: #92a9c6; font-size: 13px; margin: 0 0 22px; }
  .lock-form { display: flex; flex-direction: column; gap: 12px; }
  .lock-pw { width: 100%; box-sizing: border-box; padding: 13px 14px; font-size: 15px; background: #0a1628; color: #e8f0fa; border: 1px solid #1d3a5f; border-radius: 8px; outline: none; transition: border-color .15s ease, box-shadow .15s ease; font-family: inherit; }
  .lock-pw:focus { border-color: #1ab5b5; box-shadow: 0 0 0 3px rgba(26,181,181,0.18); }
  .lock-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; background: linear-gradient(135deg, #119090 0%, #1ab5b5 100%); color: #06121f; border: 0; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: transform .08s ease, box-shadow .15s ease; }
  .lock-btn:hover { box-shadow: 0 6px 18px rgba(26,181,181,0.35); }
  .lock-btn:active { transform: translateY(1px); }
  .lock-btn[disabled] { opacity: 0.55; cursor: progress; }
  .lock-error { color: #ff6b6b; font-size: 13px; margin-top: 14px; min-height: 18px; }
  .lock-foot { margin-top: 22px; color: #6a8099; font-size: 11px; letter-spacing: 0.3px; }
  .lock-meta { color: #6a8099; font-size: 11px; margin-top: 4px; }
</style>

(function(){
  var form = document.getElementById('lock-form');
  var pwInput = document.getElementById('lock-pw');
  var btn = document.getElementById('lock-btn');
  var errBox = document.getElementById('lock-error');
  var CACHE_KEY = 'tng-leadership-pw';

  async function deriveKey(password, saltB64, iterations){
    var enc = new TextEncoder();
    var salt = Uint8Array.from(atob(saltB64), function(c){return c.charCodeAt(0);});
    var baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256'},
      baseKey,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );
  }
  async function decryptPayload(payload, password){
    var key = await deriveKey(password, payload.salt, payload.iter);
    var iv = Uint8Array.from(atob(payload.iv), function(c){return c.charCodeAt(0);});
    var ct = Uint8Array.from(atob(payload.ct), function(c){return c.charCodeAt(0);});
    var plain = await crypto.subtle.decrypt({name:'AES-GCM', iv: iv}, key, ct);
    return new TextDecoder().decode(plain);
  }
  function renderDecrypted(html){
    // Replace the entire document so the dashboard's own <head>, styles, and
    // <script> blocks parse and execute as if served directly.
    document.open();
    document.write(html);
    document.close();
  }
  async function tryUnlock(password, silent){
    btn.disabled = true;
    btn.textContent = 'Unlocking…';
    errBox.textContent = '';
    try {
      var html = await decryptPayload(window.__TNG_PAYLOAD, password);
      try { sessionStorage.setItem(CACHE_KEY, password); } catch(e) {}
      renderDecrypted(html);
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Unlock dashboard';
      if (!silent) {
        errBox.textContent = 'Wrong password — try again.';
        pwInput.value = '';
        pwInput.focus();
      }
      try { sessionStorage.removeItem(CACHE_KEY); } catch(e) {}
    }
  }

  if (!window.crypto || !window.crypto.subtle) {
    errBox.textContent = 'This browser does not support modern crypto. Please use a recent Chrome, Safari, Firefox, or Edge.';
    btn.disabled = true;
    return;
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var pw = pwInput.value;
    if (!pw) return;
    tryUnlock(pw, false);
  });

  // If the password was used earlier in this browser session, try it silently.
  try {
    var cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) tryUnlock(cached, true);
  } catch(e) {}
})();
